<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scent Lost - 404 - Al Noor Attar (النور للعطور)</title>
    
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/animations.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    
    <style>
      .error-sec {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%), var(--bg-primary);
        text-align: center;
        padding: 2rem;
      }
      .error-wrap {
        max-width: 550px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }
      .error-vector {
        width: 120px;
        height: 120px;
        color: var(--gold-primary);
        animation: loaderPulse 4s infinite ease-in-out;
      }
      .error-title {
        font-family: var(--font-display);
        font-size: 3rem;
        font-weight: 700;
        letter-spacing: 0.15em;
      }
      .error-title span {
        display: block;
        font-family: var(--font-arabic);
        font-size: 2rem;
        color: var(--gold-primary);
        margin-top: 0.25rem;
      }
      .error-desc {
        color: var(--text-secondary);
        font-size: 1.1rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body class="dark-mode">

    <header class="header-nav">
      <div class="nav-container">
        <a href="/index.html" class="logo-area" id="brand-logo" title="Al Noor Home">
          <svg viewBox="0 0 100 100" class="gold-text">
            <polygon points="50,5 63,35 95,35 70,55 80,85 50,70 20,85 30,55 5,35 37,35" fill="none" stroke="currentColor" stroke-width="3" stroke-miterlimit="10"/>
            <circle cx="50" cy="50" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
            <polygon points="50,15 57,40 82,40 62,54 70,78 50,65 30,78 38,54 18,40 43,40" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
          <div class="brand-text">
            AL NOOR <span class="brand-arabic">النور</span>
          </div>
        </a>

        <nav class="nav-links">
          <a href="/index.html" class="nav-item" data-i18n="nav_home">Home</a>
          <a href="/features.html" class="nav-item" data-i18n="nav_features">Features</a>
          <a href="/pricing.html" class="nav-item" data-i18n="nav_pricing">Pricing</a>
          <a href="/contact.html" class="nav-item" data-i18n="nav_contact">Contact</a>
        </nav>

        <div class="nav-controls">
          <div class="lang-switch-luxury">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="bn">BN</button>
          </div>

          <button class="icon-btn theme-toggle-btn" aria-label="Toggle visual theme" title="Toggle Theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          </button>

          <button class="hamburger" aria-label="Toggle drawer layout">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <div class="mobile-drawer">
      <div class="mobile-drawer-links">
        <a href="/index.html" class="mobile-nav-item" data-i18n="nav_home">Home</a>
        <a href="/features.html" class="mobile-nav-item" data-i18n="nav_features">Features</a>
        <a href="/pricing.html" class="mobile-nav-item" data-i18n="nav_pricing">Pricing</a>
        <a href="/contact.html" class="mobile-nav-item" data-i18n="nav_contact">Contact</a>
      </div>
    </div>
    <div class="backdrop"></div>


    <main class="error-sec">
      <div class="error-wrap anim-fade-in-up">
        <svg class="error-vector" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,3"/>
          <polygon points="50,15 75,50 50,85 25,50" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="8" fill="var(--gold-primary)"/>
        </svg>

        <h1 class="error-title">
          404
          <span>سلوك মরীচিকা</span>
        </h1>

        <p class="error-desc">
          The olfactory pathway is broken. The destination you seek has evaporated from our heritage fragrance vaults.
          <span style="display: block; margin-top: 0.5rem; font-size: 0.95rem; font-style: italic; opacity: 0.85;">
            দুঃখিত, অনুসন্ধানকৃত পৃষ্ঠাটি আমাদের এই সুগন্ধি সংরক্ষণাগারে পাওয়া যায়নি।
          </span>
        </p>

        <a href="/index.html" class="btn btn-primary" data-i18n="nav_home" style="margin-top: 1rem;">Return Home</a>
      </div>
    </main>


    <script src="/js/theme.js"></script>
    <script src="/js/language.js" type="module"></script>
    <script src="/js/navbar.js"></script>

  </body>
</html>
